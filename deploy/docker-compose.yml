services:
  sidecar:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      WORKER_CONCURRENCY: "4"
      RUST_LOG: info

  # Example FastAPI consumer (replace with your app image).
  api:
    image: python:3.12-slim
    working_dir: /app
    command: python -m http.server 8000
    ports:
      - "8000:8000"
    environment:
      DFT2DXF_SIDECAR_URL: http://sidecar:8080
    depends_on:
      - sidecar
